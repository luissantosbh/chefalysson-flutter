name: chef_alysson
description: App de delivery de comida japonesa — Chef Alysson
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0
  firebase_messaging: ^15.1.0

  # Auth Social
  google_sign_in: ^6.2.0
  sign_in_with_apple: ^6.0.0
  crypto: ^3.0.3           # SHA-256 para Apple Sign In

  # Estado
  provider: ^6.1.2

  # QR Code
  qr_flutter: ^4.1.0

  # Imagens de rede
  cached_network_image: ^3.4.0

  # Clipboard (Pix copia e cola)
  # já incluso no Flutter via Clipboard.setData

  # HTTP para ViaCEP
  http: ^1.2.0

  # Compartilhamento nativo (Share Sheet)
  share_plus: ^10.0.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/AppIcon-1024.png"
  remove_alpha_ios: true
